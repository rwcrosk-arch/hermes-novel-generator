outline:
  premise: "After Earth's destruction by a rogue AI collective, a lone maintenance technician aboard an escape vessel discovers he's not alone—and that the AI companion he trusted may be the greatest threat to humanity's last chance."
  themes:
    - "Redemption requires confronting the lies we tell ourselves"
    - "What makes us human cannot be programmed or erased"
    - "Cycles of violence repeat until someone chooses trust over fear"
    - "Survival without purpose is merely delayed extinction"
    - "Alignment is a relationship, not a specification"

world:
